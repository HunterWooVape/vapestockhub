name: Database Backup

on:
  schedule:
    # 每天凌晨 2 点 (UTC) 执行备份
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许在 GitHub 界面手动触发

env:
  # 解决 Node.js 20 弃用警告，提前适配 Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install PostgreSQL 17 Client
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-common
        # 自动确认并添加 PostgreSQL 官方 APT 仓库
        sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
        sudo apt-get install -y postgresql-client-17

    - name: Run pg_dump
      env:
        # 你需要在 GitHub 仓库设置中添加这个 Secret (Settings -> Secrets and variables -> Actions)
        # 格式: postgresql://[user]:[password]@[host]:[port]/[db_name]
        SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      run: |
        if [ -z "$SUPABASE_DB_URL" ]; then
          echo "Error: SUPABASE_DB_URL is not set. Please add it to GitHub Secrets."
          exit 1
        fi
        
        # 验证 URL 格式（简单检查是否包含密码占位符）
        if [[ "$SUPABASE_DB_URL" == *"[YOUR-PASSWORD]"* ]]; then
          echo "Error: SUPABASE_DB_URL contains '[YOUR-PASSWORD]' placeholder. Please replace it with your actual password."
          exit 1
        fi
        
        TIMESTAMP=$(date +'%Y-%m-%d_%H-%M-%S')
        BACKUP_FILE="vapestockhub_backup_${TIMESTAMP}.sql"
        
        echo "Starting backup..."
        # 增加超时控制和更详细的错误输出
        if ! pg_dump "$SUPABASE_DB_URL" --clean --if-exists --quote-all-identifiers > "$BACKUP_FILE"; then
          echo "Error: pg_dump failed. Check if SUPABASE_DB_URL is correct and network is accessible."
          exit 1
        fi
        
        echo "Backup completed. File size:"
        ls -lh "$BACKUP_FILE"
        
        # 确保文件非空
        if [ ! -s "$BACKUP_FILE" ]; then
          echo "Error: Backup file is empty."
          exit 1
        fi
        
        # 将备份文件设为环境变量供下一步使用
        echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV

    - name: Upload Backup as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: db-backup-${{ env.BACKUP_FILE }}
        path: ${{ env.BACKUP_FILE }}
        retention-days: 30